<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>NexOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="core/style.css"/>
</head>
<body>

<!-- BOOT -->
<div id="boot">
  <div class="boot-logo">
    <svg width="56" height="56" viewBox="0 0 48 48" fill="none">
      <rect x="4"  y="4"  width="18" height="18" rx="5" fill="#3ecf8e"/>
      <rect x="26" y="4"  width="18" height="18" rx="5" fill="#3ecf8e" opacity=".65"/>
      <rect x="4"  y="26" width="18" height="18" rx="5" fill="#3ecf8e" opacity=".65"/>
      <rect x="26" y="26" width="18" height="18" rx="5" fill="#3ecf8e" opacity=".35"/>
    </svg>
    <span>NexOS</span>
  </div>
  <div class="boot-bar-track"><div class="boot-bar-fill" id="boot-bar"></div></div>
  <p class="boot-msg" id="boot-msg">Démarrage…</p>
</div>

<!-- OS -->
<div id="os" hidden>

  <!-- Titlebar -->
  <div id="titlebar">
    <div class="tb-drag"></div>
    <div class="tb-btns">
      <button id="tb-close" title="Arrêter NexOS" class="red">⏻</button>
    </div>
  </div>

  <!-- Bureau -->
  <div id="desktop">
    <div class="wallpaper" aria-hidden="true"></div>
    <div id="win-layer"></div>

    <!-- Taskbar bas -->
    <div id="taskbar">
      <button id="start-btn" title="Menu">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none">
          <rect x="4"  y="4"  width="18" height="18" rx="4" fill="currentColor"/>
          <rect x="26" y="4"  width="18" height="18" rx="4" fill="currentColor" opacity=".7"/>
          <rect x="4"  y="26" width="18" height="18" rx="4" fill="currentColor" opacity=".7"/>
          <rect x="26" y="26" width="18" height="18" rx="4" fill="currentColor" opacity=".4"/>
        </svg>
      </button>
      <div id="tb-apps"></div>
      <div id="tb-clock"></div>
    </div>

    <!-- Menu démarrer -->
    <div id="start-menu" hidden>
      <div class="sm-title">NexOS <span>v0.2</span></div>
      <div class="sm-grid" id="sm-grid"></div>
      <button id="sm-quit">⏻ Quitter</button>
    </div>

  </div>
</div>

<script src="core/kernel.js"></script>
<script src="core/wm.js"></script>
<script src="core/taskbar.js"></script>
<script src="apps/navigateur.js"></script>
<script src="apps/fichiers.js"></script>
<script src="apps/bloc-notes.js"></script>
<script src="apps/calculatrice.js"></script>
<script src="apps/meteo.js"></script>
<script src="apps/horloge.js"></script>
<script src="apps/galerie.js"></script>
<script src="apps/musique.js"></script>
<script src="apps/calendrier.js"></script>
<script src="apps/dessin.js"></script>
<script src="apps/parametres.js"></script>
<script src="apps/terminal.js"></script>
<script src="core/boot.js"></script>
</body>
</html>
